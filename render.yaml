services:
  - type: web
    name: darb
    env: node
    rootDir: server
    buildCommand: npm install && cd ../client && npm install && npm run build
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
